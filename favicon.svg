<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <defs>
    <linearGradient id="grad" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a574;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#9a6b42;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Hair curl -->
  <path d="M 40 7 Q 48 3 51 10 Q 54 18 47 19 Q 41 20 40 14"
        fill="none" stroke="url(#grad)" stroke-width="6"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Head -->
  <circle cx="40" cy="46" r="28"
          fill="none" stroke="url(#grad)" stroke-width="6"/>

  <!-- Eyes -->
  <circle cx="30" cy="42" r="4.5" fill="url(#grad)"/>
  <circle cx="50" cy="42" r="4.5" fill="url(#grad)"/>

  <!-- Eye shine -->
  <circle cx="31.8" cy="40.2" r="1.4" fill="white" opacity="0.75"/>
  <circle cx="51.8" cy="40.2" r="1.4" fill="white" opacity="0.75"/>

  <!-- Nose dots -->
  <circle cx="37.5" cy="49" r="1.8" fill="url(#grad)" opacity="0.6"/>
  <circle cx="42.5" cy="49" r="1.8" fill="url(#grad)" opacity="0.6"/>

  <!-- Smile -->
  <path d="M 30 55 Q 40 64 50 55"
        fill="none" stroke="url(#grad)" stroke-width="5.5"
        stroke-linecap="round"/>
</svg>
